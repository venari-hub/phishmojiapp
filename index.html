<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phishmoji</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>Phishmoji</h1>
        
        <div id="emoji-display" style="font-size: 4rem; margin: 20px 0;">🐠🎶❓</div>
        
        <input type="text" id="guess-input" placeholder="Name that tune...">
        <button id="guess-btn">Guess</button>
        <button id="skip-btn">Skip</button>
        <button id="next-btn" style="display: none;">Next Song</button>
        
        <p id="message"></p>
        
        <p>This Run: <span id="score">0</span></p>
        <button id="share-btn" style="display: none;">Share Streak 📱</button>
        
        <!-- Score tracker -->
        <p>Current Streak: <span id="streak">0</span> | Longest Ever Streak: <span id="high-score">0</span></p>

        <hr style="margin: 30px 0; border: 0; border-top: 2px solid #eee;">

        <div>
    <div class="suggestion-container">
        <hr style="margin: 30px 0; border: 0; border-top: 2px solid #eee;">
        <p style="font-size: 1rem; margin-bottom: 10px; color: #444;">Got a better emoji combo?</p>
        <form id="submit-form">
            <input type="text" id="suggest-song" placeholder="Song Title" required style="width: 45%; font-size: 0.9rem;">
            <input type="text" id="suggest-emoji" placeholder="Emojis" required style="width: 40%; font-size: 0.9rem;">
            <button type="submit" id="submit-idea-btn" style="background-color: #2e7d32; font-size: 0.9rem; display: block; width: 90%; margin: 10px auto;">Send Suggestion</button>
        </form>
        <p id="form-status" style="font-size: 0.9rem; color: #2e7d32; display: none;">Thanks for the idea!</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
