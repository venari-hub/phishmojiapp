<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <!-- Link Preview and Social Share Info -->
    <title>Phishmoji</title>
    <meta name="description" content="Can you guess the Phish song from the emojis?">
    <meta property="og:title" content="Phishmoji - The Phish Emoji Game">
    <meta property="og:description" content="Test your Phish knowledge! Can you guess the song from the emojis?">
    <meta property="og:image" content="preview.png">
    
    <!-- App Icons and Theme -->
    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">
    <meta name="theme-color" content="#1a567b">
    
    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Fonts, Styles, and Analytics -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script defer src="https://cloud.umami.is/script.js" data-website-id="YOUR-UNIQUE-ID-HERE"></script>
</head>
<body>
    <div class="game-container">
        <h1>Phishmoji</h1>
        
        <p style="margin: 10px 0;">Current Streak: <span id="streak">0</span> &nbsp;•&nbsp; Skips: <span id="skips-left">3</span></p>
        <div id="emoji-display" style="font-size: 4rem; margin: 20px 0;">🐠🎶❓</div>
        
        <input type="text" id="guess-input" placeholder="Name that tune...">
        <button id="guess-btn">Guess</button>
        <button id="skip-btn">Skip</button>
        <button id="next-btn" style="display: none;">Next Song</button>
        
        <p id="message"></p>
        <button id="share-btn" style="display: none;">Share Streak 📱</button>

        <div class="footer-stats">
            <hr style="margin: 30px 0; border: 0; border-top: 2px solid #eee;">
            <p style="font-size: 0.9rem; color: #666;">Longest Streak: <span id="high-score">0</span></p>
        </div>
    </div> <div class="suggestion-container">
        <p style="font-size: 1rem; margin-bottom: 10px; color: #444;">Got a better emoji combo?</p>
        <form id="submit-form">
            <input type="text" id="suggest-song" placeholder="Song Title" required style="width: 45%; font-size: 0.9rem;">
            <input type="text" id="suggest-emoji" placeholder="Emojis" required style="width: 40%; font-size: 0.9rem;">
            <button type="submit" id="submit-idea-btn" style="background-color: #2e7d32; font-size: 0.9rem; display: block; width: 90%; margin: 10px auto;">Send Suggestion</button>
        </form>
        <p id="form-status" style="font-size: 0.9rem; color: #2e7d32; display: none;">Thanks for the idea!</p>
    </div>

    <script src="script.js"></script>
    <!-- Turn on the Service Worker for app installation -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js');
        });
      }
    </script>
</body>
</body>
</html>
